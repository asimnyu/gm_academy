<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GM Academy - Prime Edition</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <style>
        body { background: #000; color: #00d1ff; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: manipulation; }
        .overlay-screen { position: fixed; width: 100%; height: 100%; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        
        .glitch { font-size: clamp(2.5rem, 8vw, 4.5rem); text-shadow: 0 0 20px #ff0055; margin-bottom: 20px; letter-spacing: 8px; font-weight: 900; }
        input { background: transparent; border: none; border-bottom: 4px solid #00ff96; color: #fff; font-size: 3.5rem; text-align: center; width: 80%; outline: none; margin: 40px 0; }
        .glow-btn { background: none; border: 2px solid #00ff96; color: #00ff96; padding: 25px 60px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 25px rgba(0,255,150,0.4); }

        .protocol-btn { background: rgba(0, 209, 255, 0.05); border: 1px solid #00d1ff; color: #00d1ff; width: 85%; max-width: 500px; padding: 25px; margin: 10px; font-size: 1.3rem; border-radius: 12px; text-transform: uppercase; letter-spacing: 2px; }
        
        .var-card { border: 1px solid #00ff96; background: rgba(0,255,150,0.05); padding: 20px; border-radius: 10px; cursor: pointer; text-align: left; width: 85%; max-width: 500px; margin: 10px 0; }

        #main-game { display: none; width: 100vw; height: 100vh; }
        #board-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #board { width: 85vh; max-width: 92vw; border: 5px solid #333; box-shadow: 0 0 50px rgba(0, 209, 255, 0.4); }
        
        .stats-row { display: flex; justify-content: center; gap: 80px; font-size: 2.2rem; color: #00ff96; margin-top: 25px; text-shadow: 0 0 15px #00ff96; font-weight: bold; }
        
        #warning-hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay-screen">
        <h1 class="glitch">COMMANDER YUVAN</h1>
        <input type="text" id="player-name" placeholder="IDENTIFY...">
        <button class="glow-btn" onclick="enterAcademy()">INITIATE SYSTEM</button>
    </div>

    <div id="protocol-screen" class="overlay-screen" style="display:none;">
        <h2 style="color:#00ff96; letter-spacing:10px; margin-bottom:40px;">MISSION HUB</h2>
        <button class="protocol-btn" onclick="showOpenings()">01 OPENING BIOPSY</button>
        <button class="protocol-btn" onclick="startProtocol('MEMORY')">02 REPERTOIRE STRIKE</button>
        <button class="protocol-btn" onclick="startProtocol('SCAN')">03 TACTICAL SCAN</button>
    </div>

    <div id="opening-screen" class="overlay-screen" style="display:none;">
        <h2 style="color:#00ff96; margin-bottom:30px;">SELECT SECTOR</h2>
        <div id="opening-list" style="display:flex; flex-direction:column; align-items:center; width:100%;"></div>
        <button class="protocol-btn" style="border-color:#ff0055; color:#ff0055" onclick="location.reload()">RE-BOOT</button>
    </div>

    <div id="variation-screen" class="overlay-screen" style="display:none;">
        <h2 style="color:#00ff96; margin-bottom:30px;">SELECT GAUNTLET</h2>
        <div id="variation-list" style="display:flex; flex-direction:column; align-items:center; width:100%;"></div>
    </div>

    <div id="warning-hud">
        <div style="background:#111; border:2px solid #ff0055; padding:30px; border-radius:20px; width:80%; max-width:500px; text-align:center;">
            <h3 style="color:#ff0055">TACTICAL FAILURE</h3>
            <p id="hud-text" style="color:white; font-size:1.4rem; margin:20px 0;"></p>
            <p id="penalty-text" style="color:#ff0055; font-weight:bold;"></p>
            <button id="rewind-btn" class="protocol-btn" style="background:#ff0055; color:white; border:none;">REWIND (-50 IQ)</button>
            <button onclick="hideHUD()" class="protocol-btn">ADAPT & CONTINUE</button>
        </div>
    </div>

    <div id="main-game">
        <div id="board-container">
            <div id="board"></div>
            <div id="dashboard">
                <div class="stats-row">
                    <div>IQ: <span id="rating">1000</span></div>
                    <div>MOVES: <span id="move-count">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let board = null, game = new Chess(), gmDatabase = {};
        let activeVar = null, moveIndex = 0, currentIQ = 1000, currentMusic = null;

        async function enterAcademy() {
            if (document.getElementById('player-name').value.toLowerCase() !== "yuvan") return alert("DENIED");
            playEffect('transform');
            startMusic(1);
            speak("GREETINGS COMMANDER YUVAN. AUTOBOTS, ROLL OUT.");
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('protocol-screen').style.display = 'flex';
            const res = await fetch('gm_master_database.json');
            gmDatabase = await res.json();
        }

        function showOpenings() {
            playEffect('transform');
            document.getElementById('protocol-screen').style.display = 'none';
            document.getElementById('opening-screen').style.display = 'flex';
            const list = document.getElementById('opening-list');
            list.innerHTML = "";
            Object.keys(gmDatabase).forEach(op => {
                const btn = document.createElement('button');
                btn.className = "protocol-btn";
                btn.innerText = op.replace('_', ' ');
                btn.onclick = () => loadVariations(op);
                list.appendChild(btn);
            });
        }

        function loadVariations(op) {
            playEffect('transform');
            document.getElementById('opening-screen').style.display = 'none';
            document.getElementById('variation-screen').style.display = 'flex';
            const list = document.getElementById('variation-list');
            list.innerHTML = "";
            gmDatabase[op].variations.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = "var-card";
                card.innerHTML = `<div style="color:#00ff96">GAUNTLET 0${i+1}</div><div style="font-size:1.4rem">${v.name}</div>`;
                card.onclick = () => startGauntlet(v);
                list.appendChild(card);
            });
        }

        function startGauntlet(v) {
            playEffect('transform');
            activeVar = v; moveIndex = 0;
            document.getElementById('variation-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'block';
            speak(`ENGAGING ${v.name}. ACCURACY MONITORING ACTIVE.`);
            board = Chessboard('board', {
                draggable: true, position: 'start', onDrop: handleMove,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
        }

        function handleMove(source, target) {
            const move = game.move({ from: source, to: target, promotion: 'q' });
            const alpha = activeVar.path[moveIndex];
            const moveNum = game.history().length;

            if (moveNum <= 10) {
                if (!move || move.san !== alpha) {
                    if (move) game.undo();
                    speak("NEGATIVE. WRONG MOVE. RE-MAP.");
                    return 'snapback';
                }
            } else {
                if (move && move.san !== alpha) {
                    currentIQ -= 25; updateUI();
                    triggerRefutation(move.san);
                }
            }

            moveIndex++;
            if (moveIndex < activeVar.path.length) {
                setTimeout(() => {
                    game.move(activeVar.path[moveIndex]);
                    board.position(game.fen());
                    moveIndex++;
                    document.getElementById('move-count').innerText = moveIndex;
                    if (moveIndex >= activeVar.path.length) finish();
                }, 700);
            }
        }

        function triggerRefutation(played) {
            speak(`Vulnerability detected. Move ${played} is a failure.`);
            const explanation = activeVar.explanations?.[moveIndex] || "Structural integrity lost. Opponent gains advantage.";
            document.getElementById('hud-text').innerText = explanation;
            document.getElementById('penalty-text').innerText = "IQ PENALTY APPLIED: -25";
            document.getElementById('rewind-btn').onclick = () => rewind(50);
            document.getElementById('warning-hud').style.display = 'flex';
        }

        function rewind(penalty) {
            currentIQ -= penalty; updateUI();
            game.undo(); board.position(game.fen()); moveIndex--;
            hideHUD();
            speak("Time synchronized. Re-map the Alpha move.");
        }

        function hideHUD() { document.getElementById('warning-hud').style.display = 'none'; }
        function updateUI() { document.getElementById('rating').innerText = currentIQ; }
        function playEffect(f) { new Audio(`assets/music/${f}.mp3`).play().catch(()=>{}); }
        function startMusic(id) {
            if (currentMusic) currentMusic.pause();
            currentMusic = new Audio(`assets/music/track${id}.mp3`);
            currentMusic.loop = true; currentMusic.volume = 0.3;
            currentMusic.play().catch(()=>{});
        }
        
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.pitch = 0.1; msg.rate = 0.75;
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            speak(`MISSION SUCCESS. OPPONENT NEUTRALIZED.`);
            alert("SUCCESS. RELOADING HUB."); location.reload();
        }
    </script>
</body>
</html>
